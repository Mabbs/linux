<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mayx's Blog Terminal</title>
  <style>
    @import url(vendor/xterm/xterm.css);

    :root {
      --bg: #fff;
      --fg: #727272;
      --heading: #222;
      --link: #267CB9;
      --border: #e5e5e5;
      --code-bg: #f8f8f8;
      --term-bg: #1a1b26;
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      margin: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      font: 14px/1.5 "Noto Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--fg);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .topbar .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--heading);
      text-decoration: none;
    }

    .topbar .logo:hover {
      color: var(--link);
    }

    .topbar nav {
      display: flex;
      gap: 14px;
      margin-left: auto;
    }

    .topbar nav a {
      font-size: 0.85rem;
      color: var(--link);
      text-decoration: none;
    }

    .topbar nav a:hover {
      text-decoration: underline;
    }

    .topbar .badge {
      font-size: 0.75rem;
      color: #999;
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 3px;
    }

    .terminal-wrap {
      flex: 1;
      position: relative;
      background: var(--term-bg);
      overflow: hidden;
    }

    .terminal-wrap #terminal {
      position: absolute;
      top: 12px;
      right: 16px;
      bottom: 20px;
      left: 16px;
    }

    .status-dot {
      position: absolute;
      top: 10px;
      right: 14px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #6b7280;
      font-family: monospace;
    }

    .status-dot .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fbbf24;
      animation: pulse 1.5s infinite;
    }

    .status-dot.booted .dot {
      background: #34d399;
      animation: none;
    }

    .status-dot.failed .dot {
      background: #f87171;
      animation: none;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }
  </style>
  <script src="coi-serviceworker.min.js"></script>
</head>

<body>
  <div class="topbar">
    <a class="logo" href="/">Mayx's Blog</a>
    <span class="badge">WASM Linux Terminal</span>
    <nav>
      <a href="http/80/" target="_blank">Terminal Status</a>
      <a href="/archives.html" target="_blank">Archives</a>
      <a href="/search.html" target="_blank">Search</a>
    </nav>
  </div>
  <div class="terminal-wrap">
    <div class="status-dot" id="status">
      <span class="dot"></span>
      <span id="status-text">booting</span>
    </div>
    <div id="terminal"></div>
  </div>
  <script type="module">
    import { FitAddon, Terminal, WebglAddon } from "./vendor/xterm/dist.js";
    import { consoleDevice, entropyDevice, spawnMachine, ethernetDevice, ethernetNetwork } from "./dist/index.js";
    import { fetchInternetGateway, proxyToGuest } from "./fetch-network.js";

    // 反向代理需要的全局状态，提前声明以便下面的 message 监听器(在初始化前就绑定)可访问。
    let gateway = null;       // fetchInternetGateway 返回的网关实例
    let gatewayError = null;  // 初始化失败/未跨源隔离等原因，供代理请求回传诊断用

    const statusEl = document.getElementById("status");
    const statusText = document.getElementById("status-text");
    const setStatus = (state, text) => {
      statusEl.className = "status-dot " + state;
      statusText.textContent = text;
    };

    const term = new Terminal({
      convertEol: true,
      fontFamily: "Monaco, Menlo, Consolas, 'Courier New', monospace",
      fontSize: 13,
      cursorBlink: true,
      theme: {
        background: "#1a1b26",
        foreground: "#a9b1d6",
        cursor: "#c0caf5",
        selectionBackground: "#33467c",
        black: "#32344a",
        red: "#f7768e",
        green: "#9ece6a",
        yellow: "#e0af68",
        blue: "#7aa2f7",
        magenta: "#ad8ee6",
        cyan: "#449dab",
        white: "#787c99",
        brightBlack: "#444b6a",
        brightRed: "#ff7a93",
        brightGreen: "#b9f27c",
        brightYellow: "#ff9e64",
        brightBlue: "#7da6ff",
        brightMagenta: "#bb9af7",
        brightCyan: "#0db9d7",
        brightWhite: "#acb0d0",
      },
    });
    const termFit = new FitAddon();
    term.loadAddon(termFit);
    term.open(document.getElementById("terminal"));
    termFit.fit();
    window.onresize = () => termFit.fit();
    try { term.loadAddon(new WebglAddon()); } catch (err) { }

    // ---- 反向代理：浏览器 -> guest 内的 HTTP 服务 ----
    // service worker(sw.js, 作用域 <目录>/http/)拦截 <目录>/http/<port>/<path> 的请求，
    // 通过标准 postMessage 把请求发给本页面；本页面用网关的 lwIP 栈去连 guest 真实 IP:<port>，
    // 把 guest 的响应流式 postMessage 回 SW，再返回给浏览器。
    // 用标准 postMessage(页面用 getRegistration(scope).active.postMessage 回传)而非 BroadcastChannel
    // / MessageChannel+port 转移，规避后者在 SW<->页面这一跳不可靠导致页面收不到回音(503 超时)。
    // 注意：监听器在初始化之前就绑定，这样即便网关初始化失败(如未跨源隔离)，页面也一定会对 SW 的
    // 请求回一个明确的诊断错误，而不是让 SW 干等 20s 超时。
    const baseDir = location.pathname.replace(/\/[^/]*$/, "/"); // 例如 "/" 或 "/linux/"
    const proxyScope = baseDir + "http/";
    async function postToProxySw(msg) {
      try {
        const reg = await navigator.serviceWorker.getRegistration(proxyScope);
        const sw = reg && (reg.active || reg.waiting);
        if (sw) sw.postMessage(msg);
      } catch { }
    }
    navigator.serviceWorker.addEventListener("message", async (e) => {
      const d = e.data;
      if (!d || d.type !== "guest-proxy") return; // 忽略 coi 等其它 SW 的消息
      console.log("[proxy] SW -> page:", d.id, d.request && d.request.method, d.request && d.request.port);
      if (!gateway) {
        postToProxySw({ type: "guest-proxy-resp", id: d.id, error: gatewayError ? ("gateway error: " + gatewayError) : "gateway not ready (still booting)" });
        return;
      }
      let res;
      try {
        res = await proxyToGuest(gateway, d.request);
      } catch (err) {
        console.log("[proxy] proxyToGuest threw:", d.id, err && err.message);
        postToProxySw({ type: "guest-proxy-resp", id: d.id, error: String(err && err.message ? err.message : err) });
        return;
      }
      console.log("[proxy] proxyToGuest ->", d.id, res.error ? ("error " + res.error) : ("status " + res.status + " bytes " + (res.body ? res.body.length : 0)));
      if (res.error) {
        postToProxySw({ type: "guest-proxy-resp", id: d.id, error: res.error });
        return;
      }
      // 一次性把完整 body(Uint8Array，已带 Content-Length)随 status 消息回传给 SW。
      // 不再用分块/结束协议，彻底规避流式 body 未关闭导致的浏览器转圈。
      postToProxySw({
        type: "guest-proxy-resp",
        id: d.id,
        status: res.status,
        statusText: res.statusText,
        headers: res.headers,
        body: res.body || new Uint8Array(0),
      });
    });
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register(baseDir + "sw.js", { scope: proxyScope, updateViaCache: "none" })
        .catch((err) => console.warn("[sw] register failed:", err && err.message ? err.message : err));
    }

    if (!window.crossOriginIsolated) {
      gatewayError = "not cross origin isolated";
      term.write("\x1b[31mError: not cross origin isolated\x1b[0m\n");
      setStatus("failed", "error");
      throw new Error("not cross origin isolated");
    }

    const stdin = new ReadableStream({
      start(controller) {
        window._stdin = controller;
        term.onData((data) => controller.enqueue(data));
      },
    }).pipeThrough(new TextEncoderStream());

    // Serialize all terminal writes through a queue to prevent output interleaving
    let writeChain = Promise.resolve();
    const enqueueWrite = (chunk) => {
      return new Promise(resolve => {
        writeChain = writeChain.then(() => new Promise(r => term.write(chunk, r))).then(resolve);
      });
    };

    const stdout = new WritableStream({
      async write(chunk) { await enqueueWrite(chunk); }
    });
    const stdout2 = new WritableStream({
      async write(chunk) { await enqueueWrite(chunk); }
    });

    const initcpio = await fetch("initramfs.cpio").then((res) => res.ok ? res.arrayBuffer() : null);
    if (!initcpio) {
      term.write("\x1b[31mFailed to fetch initramfs\x1b[0m\n");
      setStatus("failed", "no initramfs");
      throw new Error("no initramfs");
    }

    const network = ethernetNetwork();
    try {
      gateway = await fetchInternetGateway(network, {
        gatewayIp: "10.0.2.2",
        gatewayMac: "ca:fe:ba:be:07:28",
        syntheticIp: "203.0.113.1",
        forceHttps: true, // 客户机用 http 发起时，网关自动升级为 https 去取
        execPort: 20728, // 在网关 IP 上提供 jsexec HTTP 服务(客户机 `jsexec` 命令用)
        fetch: (...args) => fetch(...args), // 浏览器原生 fetch，代理到真实网络
        debug: false,
      });
    } catch (err) {
      gatewayError = String(err && err.message ? err.message : err);
      term.write("\x1b[31mFailed to init gateway: " + gatewayError + "\x1b[0m\n");
      setStatus("failed", "gateway init failed");
      throw err;
    }

    try {
      const machine = await spawnMachine({
        cmdline: "quiet",
        devices: [
          new consoleDevice(stdin, stdout),
          new entropyDevice(),
          new ethernetDevice(network)
        ],
        initcpio: new Uint8Array(initcpio),
      });

      machine.bootConsole.pipeTo(stdout2);
    } catch (err) {
      if (err instanceof RangeError && err.message.includes('Out of memory')) {
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
      }
      term.write("\x1b[31mFailed to spawn machine: " + err.message + "\x1b[0m\n");
      setStatus("failed", "spawn failed");
      throw err;
    }
    setStatus("booted", "ready");
  </script>
</body>

</html>
